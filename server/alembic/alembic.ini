# ===========================================================
# Alembic Configuration
# ===========================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Automatically add project root to sys.path
prepend_sys_path = .

# Version file path separator
version_path_separator = os

# NOTE:
# This URL is overridden in env.py using settings.DATABASE_URL
# Keep a valid sync URL here for tooling compatibility
sqlalchemy.url = postgresql://user:password@localhost:5432/ai_agent_db


# ===========================================================
# Post-write Hooks (Optional)
# ===========================================================

[post_write_hooks]


# ===========================================================
# Logging Configuration
# ===========================================================

[loggers]
keys = root, sqlalchemy, alembic


[handlers]
keys = console


[formatters]
keys = generic


# -----------------------------------------------------------
# Root Logger
# -----------------------------------------------------------

[logger_root]
level = WARN
handlers = console
qualname =


# -----------------------------------------------------------
# SQLAlchemy Logger
# -----------------------------------------------------------

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


# -----------------------------------------------------------
# Alembic Logger
# -----------------------------------------------------------

[logger_alembic]
level = INFO
handlers =
qualname = alembic


# -----------------------------------------------------------
# Console Handler
# -----------------------------------------------------------

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


# -----------------------------------------------------------
# Formatter
# -----------------------------------------------------------

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
